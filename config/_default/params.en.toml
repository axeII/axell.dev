colorScheme = "blowfish"

enableSearch = true
enableCodeCopy = true

logo = "img/logo_inverted.png"
secondaryLogo = "img/logo.png"
defaultBackgroundImage = "img/walp.jpg"

showRelatedContent = true
relatedContentLimit = 3

highlightCurrentMenuArea = true
autoSwitchAppearance = true
defaultAppearance = "dark"


smartTOC = true
smartTOCHideUnfocusedChildren = false

[header]
  layout = "fixed-fill-blur"

[homepage]
  layout = "background"
  homepageImage = "img/walp.jpg"
  showRecent = true
  showRecentItems = 3
  cardView = true
  showMoreLink = true
  showMoreLinkDest = '/posts'
  cardViewScreenWidth = false

[article]
  showHero = true
  showAuthor = true
  heroStyle = "background"
  showBreadcrumbs = true
  showTableOfContents = true
  showRelatedContent = true
  relatedContentLimit = 3
  showPagination = true
  showAuthorsBadges = true
  showSummary = true
  showReadingTime = true
  showComments = false
  showTaxonomies = true
  showEdit = true
  editURL = "https://github.com/axeII/axell.dev/tree/main/content"
  editAppendPath = true

[list]
  showHero = true
  heroStyle = "background"
  layoutBackgroundBlur = true
  layoutBackgroundHeaderSpace = false
  showBreadcrumbs = false
  showViews = false
  showLikes = false
  showSummary = false
  showTableOfContents = false
  showCards = true
  # groupByYear = false
  groupByYear = true
  cardView = true
  cardViewScreenWidth = false

[taxonomy]
  showTermCount = true
  showHero = true
  heroStyle = "background" # valid options: basic, big, background, thumbAndBackground
  showBreadcrumbs = false
  showViews = false
  showLikes = false
  showTableOfContents = true

[term]
  showHero = true
  heroStyle = "background" # valid options: basic, big, background, thumbAndBackground
  showBreadcrumbs = false
  showViews = false
  showLikes = false
  showTableOfContents = true
  groupByYear = false
  cardViewScreenWidth = false
  cardView = false

[footer]
  showAppearanceSwitcher = true
  showScrollToTop = true
